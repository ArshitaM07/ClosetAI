<!DOCTYPE html>
<html>

<head>
    <title>Profile - ClosetAI</title>
</head>

<body>

<div class="container">

<h1>Your Style Profile</h1>

<form method="POST">

<h3>Favorite Color</h3>
<input type="text" name="favorite_color">

<h3>Style</h3>
<select name="style">
    <option value="minimal">Minimal</option>
    <option value="streetwear">Streetwear</option>
    <option value="academic">Academic</option>
    <option value="casual">Casual</option>
</select>

<h3>Comfort Level</h3>
<select name="comfort_level">
    <option value="comfortable">Comfort First</option>
    <option value="balanced">Balanced</option>
    <option value="fashion">Fashion First</option>
</select>

<br><br>

<button type="submit">Save Profile</button>

</form>

<br>

<a href="/">
<button>Back to ClosetAI</button>
</a>

</div>

</body>

</html>
